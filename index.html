ml">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Alef Meulenberg</nav>         <div class="hero-grid">           <div class="portrait"><img src="https://csiindaba.africa/wp-content/uploads/2026/07/alef.png" alt="Alef Meulenberg" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Alef Meulenberg</h1>             <p class="role">Social Entrepreneur • Rhiza Babuyile</p>             <p class="copy profile-note">Alef Meulenberg is a mission-driven social entrepreneur committed to building systems that create access to relevant opportunities, especially for young people in underserved communities. Over more than 16 years, he has worked across Africa to design and scale solutions in education, healthcare, youth development, employment and entrepreneurship.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="session-pages/redesigning-capital-pathways.html">View Session —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>Systems-level impact means investing in people, shifting power to communities, and designing interventions that are sustainable, measurable and scalable.</p></article><article><b>Background</b><p>Alef has founded and led organisations including Rhiza, Fundraising for Impact and Vagebond, reaching hundreds of thousands of people through education, mobile health services, youth development and livelihood programmes. His work is rooted in locally led leadership and cross-sector partnerships across government, civil society, philanthropy and enterprise.</p></article><article><b>Organisation</b><p>Rhiza Babuyile — A social impact organisation focused on creating access to education, healthcare, youth development and sustainable livelihood opportunities in underserved communities.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script> </body> </html> </template><template id="tpl-profile-nicole-solomon"><!DOCTYPE html> <html lang="en-ZA"> <head>   <meta charset="UTF-8">   <meta name="viewport" content="width=device-width, initial-scale=1.0">   <title>Nicole Solomon | CSI Indaba 2026</title>   <link rel="preconnect" href="https://fonts.googleapis.com">   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Figtree:wght@500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Nicole Solomon</nav>         <div class="hero-grid">           <div class="portrait"><img src="https://csiindaba.africa/wp-content/uploads/2026/07/nicole.png" alt="Nicole Solomon" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Nicole Solomon</h1>             <p class="role">Social Responsibility Leader &bull; AECI</p>             <p class="copy profile-note">Nicole Solomon is a strategic leader with more than 15 years of experience across the private sector, public sector and academia. With a master's degree in commerce focused on Corporate Social Responsibility, her work spans social responsibility, marketing and communications, diversity, equity and inclusion, stakeholder relationship management and sustainability.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="session-pages/redesigning-capital-pathways.html">View Session —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>True sustainable impact is possible when business embraces its role as a force for good and invests in the empowerment of communities.</p></article><article><b>Background</b><p>Nicole has developed and led high-impact social responsibility initiatives that align with corporate strategy and deliver tangible value. Recognised for award-winning contributions to social responsibility, she brings experience in complex strategic environments and a strong commitment to empowerment, inclusion and long-term sustainability.</p></article><article><b>Organisation</b><p>AECI — Nicole contributes strategic social responsibility and sustainability leadership within a multinational corporate environment, connecting business objectives with community impact and long-term shared value.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script> </body> </html> </template><template id="tpl-profile-yumna-toefy"><!DOCTYPE html> <html lang="en-ZA"> <head>   <meta charset="UTF-8">   <meta name="viewport" content="width=device-width, initial-scale=1.0">   <title>Yumna Toefy | CSI Indaba 2026</title>   <link rel="preconnect" href="https://fonts.googleapis.com">   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Figtree:wght@500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Yumna Toefy</nav>         <div class="hero-grid">           <div class="portrait"><img src="https://csiindaba.africa/wp-content/uploads/2026/07/yummy-2.png" alt="Yumna Toefy" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Yumna Toefy</h1>             <p class="role">Speaker • Mama's Alliance</p>             <p class="copy profile-note">My diverse career spans across many facets of social development, ranging from counselling, training and project management at a senior level. I have strong interpersonal skills with a high EQ to manage, support and coach a team. My core skills include problem-solving, excellent time management and the ability to develop and maintain positive relationships with all people I encounter, especially external stakeholders.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="session-pages/redesigning-capital-pathways.html">View Session —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>Co-ordinating conferences and public platform representation works best when people are supported, coached and given room to do their best work.</p></article><article><b>Background</b><p>Yumna Toefy has worked across social development in counselling, training and senior project management roles. She is known for her interpersonal skills, coaching ability, stakeholder relationship building and steady support for teams working in complex public-facing environments.</p></article><article><b>Organisation</b><p>Mama's Alliance — Yumna contributes social development leadership through counselling, training, project management and conference coordination, with a strong focus on relationships, representation and coaching.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script> </body> </html> </template><template id="tpl-profile-taki-netshitenzhe"><!DOCTYPE html> <html lang="en-ZA"> <head>   <meta charset="UTF-8">   <meta name="viewport" content="width=device-width, initial-scale=1.0">   <title>Taki Netshitenzhe | CSI Indaba 2026</title>   <link rel="preconnect" href="https://fonts.googleapis.com">   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Figtree:wght@500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Taki Netshitenzhe</nav>         <div class="hero-grid">           <div class="portrait"><img src="https://csiindaba.africa/wp-content/uploads/2026/07/Taki.png" alt="Taki Netshitenzhe" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Taki Netshitenzhe</h1>             <p class="role">Chairperson • Vodacom Foundation</p>             <p class="copy profile-note">Taki Netshitenzhe leads external and regulatory affairs at Vodacom and serves as Chairperson of the Vodacom Foundation. Her work spans public policy, ESG strategy, corporate social investment, regulatory affairs and stakeholder engagement, drawing on deep experience in diplomacy, national security and ICT-sector transformation.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="session-pages/rewriting-relationship-business-communities-government.html">View Session —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>Public policy, responsible business and corporate social investment can work together to create meaningful societal impact when aligned with clear purpose, strong governance and collaborative partnerships.</p></article><article><b>Background</b><p>With more than nine years at Vodacom, Taki Netshitenzhe is a recognised leader in public policy, regulatory affairs and ESG. She is an Advocate of the High Court of South Africa, former South African Ambassador to Hungary and Croatia, and has contributed to national and global leadership spaces including the Vodafone Foundation Advisory Board, Vodafone Global External Affairs Exco and the B20 South Africa 2025 digital transformation task force.</p></article><article><b>Organisation</b><p>Vodacom — Taki serves as Chairperson of the Vodacom Foundation, helping steward initiatives that connect digital transformation, CSI, stakeholder engagement and social impact across the ICT sector.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script> </body> </html> </template><template id="tpl-article-geraldine"><!DOCTYPE html> <html lang="en-ZA"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Geraldine Fraser-Moleketi | CSI Indaba 2026</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Figtree:wght@400;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="styleshe or profile: speaker_profile_styles -->   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Steven Zwane</nav>         <div class="hero-grid">           <div class="portrait"><img src="assets/images/speakers/steven_zwane.png" alt="Steven Zwane" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Steven Zwane</h1>             <p class="role">Senior Lecture • University of Pretoria's Gordon Institute of Business Science</p>             <p class="copy profile-note">Dr Steven Zwane (MBA, BSc Computer Science)  Business Consultant | Educator | Social Impact Leader  Dr Steven Zwane is a business consultant, academic, and entrepreneurship advocate with more than 20 years of leadership experience across financial services, education, and development sectors. He serves as Senior Lecturer at the Gordon Institute of Business Science (GIBS), University of Pretoria, where he teaches strategy, operations, and entrepreneurship. Dr Zwane previously held senior leadership roles at Absa/Barclays Africa and served as CEO of the National Student Financial Aid Scheme (NSFAS).</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>Entrepreneurship is not taught by telling. It is learned by acting.</p></article><article><b>Background</b><p>Dr Steven Zwane is a business consultant, academic, and entrepreneurship advocate with more than 20 years of leadership experience across financial services, education, and development sectors. He serves as Senior Lecturer at the Gordon Institute of Business Science (GIBS), University of Pretoria, where he teaches strategy, operations, and entrepreneurship. Dr Zwane previously held senior leadership roles at Absa/Barclays Africa and served as CEO of the National Student Financial Aid Scheme (NSFAS). As Managing Executive: Corporate Citizenship at Absa, he led a Pan-African shared value portfolio exceeding R500 million focused on financial inclusion, entrepreneurship, and youth employability.</p></article><article><b>Organisation</b><p>University of Pretoria's Gordon Institute of Business Science — A proudly Africa-based institution, GIBS is committed to serving, inspiring and advancing world-class business practices across the continent and beyond. We embrace a human-centric approach to business; striving to make business healthier and more sustainable through decisive leadership, long-term strategic intent, and the development of inclusive, equitable, diverse and climate-sensitive business environments. Built on a reputation for entrepreneurial thinking and excellence, GIBS continues to evolve in step with the needs of business, embracing technology and disruption, while addressing the importance of humanising the world of work.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];     return 'home';   }   window.addEventListener('hashchange',function(){showPage(getFromHash());});   showPage(getFromHash()); })(); </script>    <script> window.addEventListener('DOMContentLoaded',function(){   var iframe=document.getElementById('clientFrame');   function loadPage(id){     var tpl=document.getElementById(id);     if(!tpl)return;     if(iframe&&iframe.contentDocument){       iframe.contentDocument.open();       iframe.contentDocument.write(tpl.innerHTML);       iframe.contentDocument.close();     }else{       var c=document.createElement('div');       c.innerHTML=tpl.innerHTML;       document.body.innerHTML='';       while(c.firstChild)document.body.appendChild(c.firstChild);     }     window.scrollTo(0,0);   }   function getHash(){     var h=location.hash.replace('#','');     return h?h.split('|')[0]:'home';   }   window.addEventListener('hashchange',function(){loadPage(getHash());});   loadPage(getHash()); }); </script> </body> </html> </template> <template id="tpl-profile-dr-charlene-omrawo"><!DOCTYPE html> <html lang="en-ZA"> <head>   <meta charset="UTF-8">   <meta name="viewport" content="width=device-width, initial-scale=1.0">   <title>Dr Charlene Omrawo | CSI Indaba 2026</title>   <link rel="preconnect" href="https://fonts.googleapis.com">   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Figtree:wght@500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">   <!-- CSS for profile: speaker_profile_styles -->   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Dr Charlene Omrawo</nav>         <div class="hero-grid">           <div class="portrait"><img src="https://csiindaba.africa/wp-content/uploads/2026/07/dr-charline.png" alt="Dr Charlene Omrawo" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Dr Charlene Omrawo</h1>             <p class="role">Strategy and Organisational Effectiveness Lead • ITPC Global</p>             <p class="copy profile-note">Dr Charlene Omrawo is a registered Industrial Psychologist and senior leader specialising in strategy and organisational effectiveness across public, private, and nonprofit sectors. With a PhD in Psychiatry from Stellenbosch University and over a decade of experience, she leads organisational strategy at ITPC Global while driving sustainability and operational excellence. Her portfolio spans global public health and education, donor-funded NGOs, and government entities across South Africa.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>Innovation means nothing if it cannot flexibly and sustainably address challenges posed by true lived experiences.</p></article><article><b>Background</b><p>Executive Bio:     Charlene is an enterprising for-impact strategist and organizational leader. She is adamant about staying ahead of the curve to bridge the gap between health/social disparities and disease burdens, especially in the era where climate change and other uncertainties further complicate the mission. She is a registered Industrial Psychologist with the Health Professions Council of South Africa (HPCSA) and an independent medico-legal expert witness. Her education background includes a Bachelors’ degree in Clinical-, Neuro- and Industrial Psychology (University of Cape Town), Honours’ and Masters’ degrees in Industrial/Organizational Psychology (University of Cape Town) and a PhD in Psychiatry (Stellenbosch University).</p></article><article><b>Organisation</b><p>ITPC Global — The International Treatment Preparedness Coalition (ITPC Global) is an issue-based global organisation working to achieve health and social justice through robust community engagement. Founded in 2003 in Cape Town by HIV treatment activists committed to ensuring access to life-saving medicines, ITPC has grown into a global network of people living with HIV, community activists, and supporters advocating for universal access to HIV treatment and other life-saving medicines. Operating virtually across Africa, North America, the Caribbean, and Europe, ITPC champions the principles of treatment equity, global solidarity, and meaningful community participation in the health response..</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=nav ref="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Busisiwe Kabane-Bailey</nav>         <div class="hero-grid">           <div class="portrait"><img src="https://csiindaba.africa/wp-content/uploads/2026/06/ChatGPT-Image-Jun-19-2026-05_12_36-AM.png" alt="Busisiwe Kabane-Bailey" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Busisiwe Kabane-Bailey</h1>             <p class="role">Innovation Director • DG Murray Trust</p>             <p class="copy profile-note">Dr Busisiwe Kabane-Bailey is an Innovation Director at the DG Murray Trust (DGMT), where she leads strategic initiatives at the intersection of health, social development, and systems change. With a strong focus on addressing complex societal challenges, her work spans areas such as gender-based violence, alcohol harm reduction, early childhood development, and digital inclusion..</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>Conscious capital is not just about where money goes, but how it moves: through intentional partnerships,  through trust, and through evolving systems that build an equitable future.</p></article><article><b>Background</b><p>Dr Busisiwe Kabane-Bailey is an Innovation Director at the DG Murray Trust (DGMT), where she leads strategic initiatives at the intersection of health, social development, and systems change. With a strong focus on addressing complex societal challenges, her work spans areas such as gender-based violence, alcohol harm reduction, early childhood development, and digital inclusion. A medical doctor by training from the University of Cape Town, Busisiwe brings a systems-thinking approach to social impact, combining clinical insight with a deep understanding of the social determinants of health. She is particularly interested in how collaborative, cross-sector partnerships can unlock more effective and sustainable solutions for vulnerable communities.</p></article><article><b>Organisation</b><p>DG Murray Trust — The DG Murray Trust (DGMT) is a South African public innovator committed to developing and investing in solutions that create a just society where every person has the opportunity to thrive. Working across sectors, DGMT supports initiatives that address the root causes of inequality, with a focus on early childhood development, youth opportunity, health, and social innovation. Through strategic grant-making, research, and partnerships with government, civil society, and the private sector, DGMT seeks to test, scale, and influence systems-level change that improves long-term social outcomes..</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){   <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Andisiwe Jack Ngcwembe</nav>         <div class="hero-grid">           <div class="portrait"><img src="assets/images/speakers/andisiwe_jack_ngcwembe.png" alt="Andisiwe Jack Ngcwembe" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Andisiwe Jack Ngcwembe</h1>             <p class="role">Business Development Manager • Aurik Enterprise Development (Pty) Ltd</p>             <p class="copy profile-note">Andisiwe “Jack” Ngcwembe is a Johannesburg-based Business Development Manager at Aurik Enterprise Development with over 25 years of experience in client relationship management, specialising in business development and account management across industries including mining, ICT, employee wellness, and SME development. He holds a BTech in Marketing from Cape Peninsula University of Technology and a Postgraduate Diploma in Management Practice from Henley Business School – Africa. Known for his authentic, people-centred approach, Jack excels at building trust, and creating long-term value for corporate clients.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>“True social impact is not created by sustaining dependency, but by unlocking enterprise that turns excluded communities into active participants in the economy.”</p></article><article><b>Background</b><p>Andisiwe “Jack” Ngcwembe is a Johannesburg-based Business Development Manager at Aurik Enterprise Development with over 25 years of experience in client relationship management, specialising in business development and account management across mining, ICT, employee wellness, and SME development. He holds a BTech in Marketing from Cape Peninsula University of Technology and a Postgraduate Diploma in Management Practice from Henley Business School – Africa, strengthening his strategic and leadership capabilities. Jack is known for building trusted, value-driven client relationships and driving growth through meaningful solutions. He is a devoted family man, passionate about people, connection, sport, and authentic everyday experiences..</p></article><article><b>Organisation</b><p>Aurik Enterprise Development (Pty) Ltd — Aurik Enterprise Development is a South African firm that focuses on helping established businesses grow sustainably. The company’s strength lies in building robust commercial systems within existing businesses, enabling them to unlock new revenue streams, strengthen leadership teams, and scale operations. Central to its approach is the “Asset of Value” methodology, which identifies and develops high-potential business units into scalable, standalone ventures.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&co .com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Vince Mbanze</nav>         <div class="hero-grid">           <div class="portrait"><img src="https://csiindaba.africa/wp-content/uploads/2026/07/vince.png" alt="Vince Mbanze" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Vince Mbanze</h1>             <p class="role">Founder/CEO • Nexusnode</p>             <p class="copy profile-note">Vince Mbanze is a systems scientist and Lead Scientist at Nexusnode, focused on the integrity of capital flows. He developed the Credit-to-Investment Transmission Index (CTI) to identify structural breakdowns between financial capital and real economic participation. An MSc candidate and Cisco Certified Cybersecurity Associate, his work applies scientific and computational methods to diagnose and repair systemic inefficiencies.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>In chemistry, a blocked pathway means no reaction. In economics, it means a generation left behind.</p></article><article><b>Background</b><p>Vince Mbanze’s career is defined by a trajectory from the study of fundamental elements to the engineering of complex systems. Beginning with a BSc in Life Sciences and an Honours in Chemistry, he developed a unique lens for locating structural failures. Now a Lead Scientist at Nexusnode, an MSc candidate, and a Cisco Certified Cybersecurity Associate, he bridges the gap between scientific rigor and economic policy. Vince views the repair of capital transmission systems not merely as a technical task, but as a philosophical commitment to restoring the fundamental integrity required for a society to flourish..</p></article><article><b>Organisation</b><p>Nexusnode — Nexusnode is a systems engineering and research firm dedicated to building high-integrity digital infrastructure. We specialize in "Trust as a Service" (TaaS), creating auditable platforms for the secure transmission of capital and intelligence. Our flagship development, the Credit-to-Investment Transmission Index (CTI), provides the analytical framework required to locate and repair structural blockages within economic systems.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];     return 'home';   }   window.addEventListener('hashchange',function(){showPage(getFromHash());});   showPage(getFromHash()); })(); </script>    <script> window.addEventListener('DOMContentLoaded',function(){   var iframe=document.getElementById('clientFrame');   function loadPage(id){     var tpl=document.getElementById(id);     if(!tpl)return;     if(iframe&&iframe.con   <div class="hero-grid">           <div class="portrait"><img src="https://csiindaba.africa/wp-content/uploads/2026/07/Venetia-van-Wyk.png" alt="Venetia van Wyk" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Venetia van Wyk</h1>             <p class="role">Co-Funder and Managing Director • Venren Solutions</p>             <p class="copy profile-note">Venetia van Wyk is a senior transformation specialist with over 15 years of leadership experience in large-scale corporate and listed environments. As the founder of Venren Solutions, she specialises in bridging the gap between B-BBEE compliance and practical business alignment. Venetia designs integrated strategies across Skills Development, ESD, and SED that move beyond "tick-box" exercises to build genuine organizational capability.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>Transformation made practical powerful and purposeful</p></article><article><b>Organisation</b><p>Venren Solutions — Venren Solutions is a specialist consultancy at the intersection of social and digital transformation. Led by Venetia van Wyk, the firm bridges the gap between B-BBEE compliance and future-ready business growth by integrating human-centric development with technological advancement. Venren moves beyond traditional "tick-box" exercises to implement bespoke models for Skills Development, ESD, and SED.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_rou "assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Thobile Dladla</nav>         <div class="hero-grid">           <div class="portrait"><img src="assets/images/speakers/thobile_dladla.png" alt="Thobile Dladla" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Thobile Dladla</h1>             <p class="role">Business Development Specialist • Arithmetic</p>             <p class="copy profile-note">Thobile N. Dladla is a Development Specialist and Board Member of the AIC Foundation, leading initiatives in education, entrepreneurship, and social innovation across African communities. She is a G20 C20 stakeholder contributing to global policy on education, digital economies, gender equality, and climate sustainability.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p> "Impact Beyond Advocacy-Building Real Pathways for Women into Equity, Capital, and Economic Power"</p></article><article><b>Background</b><p>Bio of Thobile N Dladla  Thobile Dladla is a Development Specialist, an Executive Board Member of the AIC Foundation, a nonprofit organization dedicated to empowering marginalized African communities through education, entrepreneurship, and social innovation. She guides sustainable initiatives focused on women, youth, and community development. Thobile also serves as a G20 stakeholder under the C20 cohort, contributing to global policy processes in Quality Education for Future Sustainability, Sustainable Digital Economies, Gender Equality, Energy Just Transition, and Climate Sustainability. She is the independent founder of Erithmette (Pty) Ltd, a private investment holding company (operating as Arithmetic Consultancy) which houses a CSI initiative 'Women@WEC' (Women's Equity and Capital) supporting women entrepreneurs and day-to-day professionals in building sustainable businesses and financial confidence through investment education and growth systems for profitability.</p></article><article><b>Organisation</b><p>Arithmetic — Erithmette (Pty) Ltd. Subsidiary: ARITHMETIC Consultancy  Overview: Erithmette (Pty) Ltd is a private investment holding company with ownership of shares spanning across sectors. Our operational activities through Arithmetic Consultancy include business management advisory, dedicated to empowering enterprises across Africa.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];     return 'home' akers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Reana Rossouw</nav>         <div class="hero-grid">           <div class="portrait"><img src="assets/images/speakers/reana_rossouw.png" alt="Reana Rossouw" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Reana Rossouw</h1>             <p class="role">CEO • Next Generation Consultants</p>             <p class="copy profile-note">Reana Rossouw is the founder of Next Generation - a leading impact advisory firm specialising in social innovation, sustainable development, impact investing, and impact management and measurement (IMM). With more than two decades of experience, she supports organisations across the social, solidarity, and impact economies to design impact strategies, measure impact, and improve impact performance.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p><span style="font-size:11.0pt;mso-fareast-font-family: &quot;Times New Roman&quot;;mso-bidi-font-family:&quot;Times New Roman&quot;;color:#3494BA; mso-themecolor:accent1;mso-fareast-language:EN-ZA">"Social Innovation without replication is a waste of time. Scale without community is imposition. And funding without accountability for impact is, at best, expensive charity - and at worst, an active obstacle to the change we claim to seek."</span><span style="font-size:11.0pt;mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family: &quot;Times New Roman&quot;;mso-fareast-language:EN-ZA"></span></p></article><article><b>Background</b><p>Next Generation’s vision is to contribute significantly to the continuous transformation of Africa by improving the competitiveness, growth and sustainability of all organisations and to do it in an economically, environmentally and socially responsible way. Through our strategic advisory, research, engagement and development,  impact management and measurement services we empower organisations to navigate the complexities of the impact economy with confidence, leading to tangible and lasting impact across the impact ecosystem. Through our work we are able to strengthen organisational systems, shape investment and development priorities, improve internal capacity, enhance impact outcomes. Reana Rossouw, our founder, is a recognised visionary, thought leader and influencer in the impact economy.</p></article><article><b>Organisation</b><p>Next Generation Consultants — Founded in 2003 by Reana Rossouw, Next Generation Consultants is a strategic and specialist impact advisory and consulting company. With a focus on social innovation, sustainable development, impact management, and measurement, we are dedicated to driving positive change and fostering growth within the impact economy. Our focus is on equipping the next generation of organisations and leadership with the solutions and insights required to bring about lasting impact.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       wind lacking systems that recognize and support them.</p></article><article><b>Background</b><p>Kgomotso Khosa is the Founder of Raising Giants Organisation and a Senior Manager in Fintech at MTN Group, with over 16 years of corporate experience across Africa and 18 years leading grassroots impact. She operates at the intersection of strategy and community, driving initiatives in youth development, digital skills, and organizational capacity building. Her work has been recognized by O Magazine as an impactful change maker, featured in House and Homes, and profiled in the FNB Help Stories campaign. She is a recipient of the Gauteng Premier’s Excellence Award and the SA Heroes Award.</p></article><article><b>Organisation</b><p>Raising Giants Organisation (RGO) — Raising Giants Organisation (RGO) is a community-driven non profit advancing youth development and grassroots impact across South Africa. Since 2008, RGO has delivered scalable programmes in sport, digital skills, and leadership, reaching thousands of young people and supporting nearly 100 non profit organizations' through governance and capacity building. With a proven track record of implementing multi-million rand projects and partnering with stakeholders across sectors, RGO is positioned to bridge the gap between grassroots organization's and funders, ensuring resources translate into measurable, sustainable community impact..</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];     return 'home';   }   window.addEventListener('hashchange',function(){showPage( rs and financial inclusion for underserved communities, with a CSI focus that spans across the African diaspora..</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];     return 'home';   }   window.addEventListener('hashchange',function(){showPage(getFromHash());});   showPage(getFromHash()); })(); </script>    <script> window.addEventListener('DOMContentLoaded',function(){   var iframe=document.getElementById('clientFrame');   function loadPage(id){     var tpl=document.getElementById(id);     if(!tpl)return;     if(iframe&&iframe.contentDocument){       iframe.contentDocument.open();       iframe.contentDocument.write(tpl.innerHTML);       iframe.contentDocument.close();     }else{       var c=document.createElement('div');       c.innerHTML=tpl.innerHTML;       document.body.innerHTML='';       while(c.firstChild)document.body.appendChild(c.firstChild);     }     window.scrollTo(0,0);   }   function getHash(){     var h=location.hash.replace('#','');     return h?h.split('|')[0]:'home';   }   window.addEventListener('hashchange',function(){loadPage(getHash());});   loadPage(getHash()); }); </script> </body> </html> </template> <template id="tpl-profile-bongo-maqungo"><!DOCTYPE html> <html lang="en-ZA"> <head>   <meta charset="UTF-8">   <meta name="viewport" content="width=device-width, initial-scale=1.0">   <title>Bongo Maqungo | CSI Indaba 2026</title>   <link rel="preconnect" href="https://fonts.googleapis.com">   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Figtree:wght@500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">   <!-- CSS for profile: speaker_profile_styles -->   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Bongo Maqungo</nav>         <div class="hero-grid">           <div class="portrait"><img src="assets/images/speakers/bongo_maqungo.png" alt="Bongo Maqungo" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Bongo Maqungo</h1>             <p class="role">Social Impact & Corporate Fundraising Specialist • Wits University</p>             <p class="copy profile-note">A social impact practitioner, fundraiser, and public spokesperson with over 14 years of experience, they work at the intersection of education, social justice, and community mobilisation in South Africa. They hold a BCom Honours from Wits University, complemented by an earlier undergraduate Bcom Marketing Management degree. Their work focuses on amplifying critical social issues through media engagement while building strategic partnerships and mobilising resources for long-term impact.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>"Through shared value, corporate growth and social progress are strategically aligned to reinforce one another.”</p></article><article><b>Background</b><p>A social impact practitioner, fundraiser, and public spokesperson with over 14 years of experience, they work at the intersection of education, social justice, and community mobilisation in South Africa. They hold a BCom Honours from the University of the Witwatersrand (Wits), complemented by an earlier undergraduate degree in Marketing Management. Their career spans roles and collaborations with organisations including the University of the Witwatersrand (Wits), Forgood, and Doctors Without Borders (Médecins Sans Frontières), where they have contributed to advancing civic engagement, volunteerism, and social justice advocacy. Their work focuses on amplifying critical social issues through media engagement while building strategic partnerships and mobilising resources for long-term, systemic impact.</p></article><article><b>Organisation</b><p>Wits University — The University of the Witwatersrand (Wits) is a leading public research university in Johannesburg, recognised for academic excellence, innovation, and a strong commitment to social justice and advancing the public good in South Africa and beyond. The Development and Fundraising Office (DFO) plays a central role in enabling this impact by mobilising resources, managing donor relationships, and building strategic partnerships with corporates, foundations, alumni, and individual supporters. Through fundraising and stewardship, the DFO helps expand access to education, supports groundbreaking research, and strengthens Wits’ ability to drive meaningful social and economic change..</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];     return 'home';   }   window.addEventListener('hashchange',function(){showPage(getFromHash());});   showPage(getFromHash()); })(); </script>    <script> window.addEventListener('DOMContentLoaded',function(){   var iframe=document.getElementById('clientFrame');   function loadPage(id){     var tpl=document.getElementById(id);     if(!tpl)return;     if(iframe&&iframe.contentDocument){       iframe.contentDocument.open();       iframe.contentDocument.write(tpl.innerHTML);       iframe.contentDocument.close();     }else{       var c=document.createElement('div');       c.innerHTML=tpl.innerHTML;       document.body.innerHTML='';       while(c.firstChild)document.body.appendChild(c.firstChild);     }     window.scrollTo(0,0);   }   function getHash(){     var h=location.hash.replace('#','');     return h?h.split('|')[0]:'home';   }   window.addEventListener('hashchange',function(){loadPage(getHash());});   loadPage(getHash()); }); </script> </body> </html> </template> <template id="tpl-profile-joanne-brink"><!DOCTYPE html> <html lang="en-ZA"> <head>   <meta charset="UTF-8">   <meta name="viewport" content="width=device-width, initial-scale=1.0">   <title>Joanne Brink | CSI Indaba 2026</title>   <link rel="preconnect" href="https://fonts.googleapis.com">   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Figtree:wght@500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">   <!-- CSS for profile: speaker_profile_styles -->   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Joanne Brink</nav>         <div class="hero-grid">           <div class="portrait"><img src="assets/images/speakers/joanne_brink.png" alt="Joanne Brink" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Joanne Brink</h1>             <p class="role">Founder & CEO | TechWays Foundation • TechWays</p>             <p class="copy profile-note">Joanne Brink is the Founder and CEO of TechWays Foundation, a South African non-profit focused on bridging the digital divide through technology, AI and youth economic inclusion. She has developed an innovative model that equips young people in underserved communities with digital freelancing skills to generate income and participate in the global digital economy. Joanne’s work challenges traditional skills development approaches by prioritising livelihoods over jobs.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>“The question is not how many jobs we create — it’s how many people we enable to earn.”</p></article><article><b>Background</b><p>Joanne Brink is the Founder and CEO of TechWays Foundation, a South African non-profit working at the intersection of technology, education and economic inclusion. A Chartered Accountant and MBA graduate, she brings over 20 years of cross-sector experience spanning finance, technology and international development. Joanne has led the development of the Youth Digital Pathway, an AI-enabled programme that equips young people in underserved communities with digital freelancing skills to generate income. Through partnerships with corporates and communities, her work focuses on scalable, inclusion-driven solutions that enable meaningful participation in the digital economy..</p></article><article><b>Organisation</b><p>TechWays — TechWays Foundation is a South African non-profit organisation focused on bridging the digital divide by equipping young people in underserved communities with practical technology and AI skills. Through school-based programmes and its Youth Digital Pathway, TechWays enables learners and unemployed youth to transition from education into income-generating opportunities in the digital economy. The organisation’s approach prioritises livelihoods over traditional employment, supporting participants to offer services, freelance and build sustainable income streams.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   function s late id="tpl-profile-reinoud-willemsen"><!DOCTYPE html> <html lang="en-ZA"> <head>   <meta charset="UTF-8">   <meta name="viewport" content="width=device-width, initial-scale=1.0">   <title>Reinoud Willemsen | CSI Indaba 2026</title>   <link rel="preconnect" href="https://fonts.googleapis.com">   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Figtree:wght@500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">   <!-- CSS for profile: speaker_profile_styles -->   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Reinoud Willemsen</nav>         <div class="hero-grid">           <div class="portrait"><img src="assets/images/speakers/reinoud_willemsen.png" alt="Reinoud Willemsen" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Reinoud Willemsen</h1>             <p class="role">Director • Embedding Impact</p>             <p class="copy profile-note">Reinoud Willemsen is a social impact expert with over a decade of experience helping organisations embed and measure social value within their strategies. As a Partner at Embedding Impact, he works at the intersection of impact, sustainability, and strategy, guiding clients to make data-driven decisions. Known for his practical, training-focused approach, he translates complex frameworks into actionable tools.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Background</b><p>Reinoud Willemsen is a leading voice in social impact measurement and management, with over a decade of experience guiding organisations to embed social value into their strategies. As a Partner at Embedding Impact, he helps clients navigate the intersection of impact, strategy, and sustainability. Known for his pragmatic and training-focused approach, Reinoud translates technical frameworks into practical tools that enable organisations to track, evaluate, and optimise their social and environmental performance. He specialises in aligning decision-making processes with global best practices, using data-driven insights to inform and enhance value creation.</p></article><article><b>Organisation</b><p>Embedding Impact — Embedding Impact is an impact advisory firm that helps organisations integrate social value into strategy and decision-making. Working at the intersection of business and society, the firm supports clients to design, measure, and manage their social and environmental impact in practical and credible ways. Grounded in global best practices, including the Social Value Principles and SDG Impact Standards, Embedding Impact enables organisations to move beyond compliance towards meaningful value creation.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/ es -->   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Lidia Pretorius</nav>         <div class="hero-grid">           <div class="portrait"><img src="https://csiindaba.africa/wp-content/uploads/2026/07/Lidia-PretoriusLidia-Pretorius.png" alt="Lidia Pretorius" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Lidia Pretorius</h1>             <p class="role">Disability Inclusion Consultant, Senior Advisor, and Empowerment Coach • nan</p>             <p class="copy profile-note">Lidia Pretorius works at the intersection of disability inclusion, power, and systems change, with a particular focus on how institutions enable or limit participation. For more than four decades, she has worked alongside persons with disabilities, their organisations, governments, and partners across Africa, supporting disability inclusion where policy, practice, and lived experience meet. She is often invited into spaces where progress feels stuck or fragmented, and brings a grounded, coaching-informed approach to facilitating dialogue, strengthening leadership, and supporting institutions to move from intention to implementation.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>In the Social Era, we cannot dismantle structural inequality while disability remains designed external of our systems.</p></article><article><b>Background</b><p>Lidia Pretorius is a disability inclusion consultant and systems change practitioner working at the intersection of Corporate Social Investment, participation, and institutional design. With over four decades of experience across Africa, she has worked alongside persons with disabilities, their organisations, governments, and development partners to advance inclusion where policy, practice, and lived experience meet. Her work focuses on how systems enable or exclude participation, supporting organisations to move beyond fragmented approaches toward integrated, sustainable inclusion. She is known for facilitating complex conversations, strengthening leadership, and positioning Organisations of Persons with Disabilities as strategic partners in shaping inclusive social investment and development outcomes..</p></article><article><b>Organisation</b><p>nan — Lidia Pretorius operates as a disability inclusion and systems change advisory practice, working closely with Organisations of Persons with Disabilities across Africa. The work focuses on how Corporate Social Investment can move beyond fragmented, disability-specific funding toward embedding inclusion within mainstream systems. It positions OPDs not as recipients, but as critical system actors who reveal design failures, strengthen institutional capability, and co-architect more inclusive approaches to social investment.</p></article>         </div>       </div>     </sectio  CSS for profile: speaker_profile_styles -->   <link rel="stylesheet" href="assets/css/015_profile_nicholas_speaker_profile_styles.css?v=profilealign2">      </head> <body>   <header class="nav">     <a class="brand" href="../index.html"><img src="https://www.image2url.com/r2/default/images/1781046234023-115517cd-32e4-4b6f-becc-4dbcba0c864c.png" alt="CSI Indaba"></a>     <ul class="links">       <li><a href="../index.html">Home</a></li><li><a href="featured-speakers.html">Speakers</a></li><li><a href="team.html">Team</a></li><li><a href="../index.html#csi-awards-exp-programme">Agenda</a></li><li><a href="insights.html">Insights</a></li>     </ul>   </header>   <main>     <section class="profile">       <div class="wrap">         <nav class="crumb"><a href="featured-speakers.html">Speakers</a> / Lindsay Hopkins</nav>         <div class="hero-grid">           <div class="portrait"><img src="assets/images/speakers/lindsay_hopkins.png" alt="Lindsay Hopkins" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Lindsay Hopkins</h1>             <p class="role">ESG & Sustainability Consultant | Social Impact Advisor | Strategy, Storytelling & Stakeholder Engagement • Onward</p>             <p class="copy profile-note">I am a South African impact strategist, speaker, and systems thinker working at the intersection of sustainability, innovation, and community-led change. With over a decade of experience across waste, food systems, and circular economy initiatives, I am known for translating complex challenges into practical, scalable solutions. I have worked across grassroots communities, corporates, and global platforms, building bridges between real-world implementation and strategic design.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div> rs on these topics, contributing significantly to public debate on the country's democratic trajectory.</p></article><article><b>Organisation</b><p>University of Johannesburg — Professor Steven Friedman is a Research Professor at the University of Johannesburg, where his work focuses on democracy, inequality, citizenship and the relationship between public voice and social justice in South Africa.</p></article>         </div>       </div>     </section>   </main>   <script src="assets/js/011_profile_nicholas_navigation_router.js?v=navfix1"></script>  <script> (function(){   var container=document.getElementById('page-container');   var pages={'home':document.getElementById('tpl-home'),'speakers':document.getElementById('tpl-featured-speakers'),'programme':document.getElementById('tpl-full-programme'),'insights':document.getElementById('tpl-insights'),'team':document.getElementById('tpl-team'),'profile-steven-friedman':document.getElementById('tpl-profile-steven-friedman')};   function loadPage(id){     if(!pages[id])return;     container.innerHTML=pages[id].innerHTML;     window.scrollTo(0,0);   }   function getHash(){     var h=location.hash.replace('#','');     return h?h.split('|')[0]:'home';   }   window.addEventListener('hashchange',function(){loadPage(getHash());});   loadPage(getHash()); }); </script> </body> </html> </template><template id="tpl-profile-verner-harris">

            <p class="copy profile-note">Verner Harris is an executive consultant at the Nelson Mandela Foundation. He was Mandela's archivist from 2004 to 2013, directed the Foundation's archives programme for 15 years, the dialogue and advocacy programme for 5 years, and was acting chief executive for eighteen months in 2023-4.</p>

        <div class="direction-grid simple-profile-grid">
          <article><b>Background</b><p>Verner Harris is an executive consultant at the Nelson Mandela Foundation. He was Mandela's archivist from 2004 to 2013, directed the Foundation's archives programme for 15 years, the dialogue and advocacy programme for 5 years, and was acting chief executive for eighteen months in 2023-4. He is an adjunct professor at both the Nelson Mandela University and the University of Cape Town, served in the Truth and Reconciliation Commission, and is a former Deputy Director of the National Archives.</p></article><article><b>Publications &amp; Honours</b><p>He has authored or co-authored six books, the most recent being Ghosts of Archive (2021), and is the recipient of honorary doctorates from the University of Cordoba (Argentina 2014) and the University of Pretoria (South Africa 2023). He held the Follet Chair at Dominican University in 2018-9 and has received archival publication awards from Australia, Canada and South Africa.</p></article><article><b>Service</b><p>Both his novels were short-listed for South Africa's M-Net Book Prize. He was a selection panel member for Atlantic Fellows for Racial Equity from 2017 to 2022 and has served on boards including Archival Science, the Ahmed Kathrada Foundation, the Freedom of Expression Institute, the Nelson Mandela Institute for Education and Rural Development, the United Nations Nelson Mandela Project for Social Change and the South African History Archive.</p></article>

n Human Rights Commission, the South African History Archive and the Department of Arts, Culture, Science and Technology. He has also contributed to Mandela-related publications and serves on governance and democracy-focused boards.</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">About</span>         <h2>Profile overview</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Perspective</b><p>History becomes powerful when it is used to build accountability, public voice and practical change.</p></article><article><b>Background</b><p>Sello Hatang joined the Nelson Mandela Foundation in 2009 as Manager of Information Communications and became Chief Executive Officer in 2013, serving in that role for about a decade. Before that, he was Head of Information Communications and spokesperson for the South African Human Rights Commission from 2005 to 2009, Director of the South African History Archive from 2002 to 2005, and a Project Archivist at the Department of Arts, Culture, Science and Technology from 1998 to 2002. He also contributed to Mandela-related publications, including Conversations with Myself and Nelson Mandela by Himself.</p></article><article><b>Organisation</b><p>Nelson Mandela Foundation — The Nelson Mandela Foundation advances Mandela's legacy through memory, dialogue and public engagement, connecting historical reflection with present-day social justice work.</p></article>         </div>       </div>     </section>   </main>   </body> </html> </template><template id="tpl-profile-verner-harris">
