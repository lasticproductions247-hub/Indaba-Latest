                                            <a class="csi-programme-v3-row" href="session-pages/the-opening-address-why-this-moment-matters.html"><span class="csi-programme-v3-thumb"><img src="https://csiindaba.africa/wp-content/uploads/2026/06/9f874a35-a5d0-43d9-b64f-ff0aded88043.png" alt="The Opening Address - Why This Moment Matters"></span><span class="csi-programme-v3-time">09:15 – 10:00</span><div><h5>The Opening Address - Why This Moment Matters</h5><p>A powerful, narrative-driven principal keynote that interrogates the structural roots of inequality and the unfinished work of institutional transformation in South Africa. Framed as a moral and strategic call to rethink institutional responsibility within the CSI ecosystem and beyond. Speaker: Dr Geraldine Fraser-Moleketi — Internationally respected voice on governance, public service, and structural transformation</p></div><span class="csi-programme-v3-pill">Module 1.1</span></a>
                                            <a class="csi-programme-v3-row" href="session-pages/understanding-south-africa-s-inequality-the-five-binding-constraints.html"><span class="csi-programme-v3-thumb"><img src="https://csiindaba.africa/wp-content/uploads/2026/06/ChatGPT-Image-Jun-19-2026-05_00_34-AM.png" alt="Prof. Nicholas Ngepah"></span><span class="csi-programme-v3-time">10:00 – 10:45</span><div><h5>Understanding South Africa's Inequality: The Five Binding Constraints</h5><p>South Africa's inequality landscape. How the Five Binding Constraints were identified, how they interconnect, and why CSI must move beyond funding projects to addressing systemic root causes. Speaker: World Inequality Report – Prof. Nicholas Ngepah</p></div><span class="csi-programme-v3-pill">Module 1.2</span></a>

                                        <article class="csi-programme-v3-hero"><div><strong>Day 2 / Systems Reimagination</strong><h4>How do we redesign CSI as a structural lever that begins dismantling the Five Binding Constraints?</h4><div class="csi-programme-v3-hero-media"><img src="https://csiindaba.africa/wp-content/uploads/2026/06/ChatGPT-Image-Jun-20-2026-02_41_56-AM.png" alt="Day 2 speaker"><img src="https://csiindaba.africa/wp-content/uploads/2026/06/ChatGPT-Image-Jun-20-2026-02_41_56-AM.png" alt="Day 2 speaker"><img src="https://csiindaba.africa/wp-content/uploads/2026/06/ChatGPT-Image-Jun-20-2026-02_41_56-AM.png" alt="Day 2 speaker"></div><p>Wednesday, 15 July 2026 moves from diagnosis to redesigned capital, coordination, participation and long-term repair.</p></div><p>Guiding question: How do we redesign CSI as a structural lever that begins dismantling the Five Binding Constraints?</p></article>
                                        <div class="csi-programme-v3-list">

                                            <a class="csi-programme-v3-row" href="session-pages/fragmented-csi-spend-design-failure.html"><span class="csi-programme-v3-thumb"><img src="https://csiindaba.africa/wp-content/uploads/2026/07/riah.png" alt="General Riah Phiyega"></span><span class="csi-programme-v3-time">09:15 – 10:00</span><div><h5>Wasted Capital: How Fragmented CSI Spend Entrenches Inequality — and What It Will Take to Change</h5><p>Main Hall. Fragmented CSI spend is the sector's defining design failure. Billions are invested annually with minimal structural impact because capital flows are uncoordinated, short-term, and disconnected from the Five Constraints. Speaker: General Riah Phiyega, CEO Safer South Africa.</p></div><span class="csi-programme-v3-pill">Panel Discussion</span></a>

<script>
// Horizontal tabbed interface for parallel workshops
function initProgrammeV3Tabs() {
  const tabContainers = document.querySelectorAll('.csi-programme-v3-tabs-container');

  tabContainers.forEach(container => {
    const tabs = container.querySelectorAll('.csi-programme-v3-tab');
    const panels = container.querySelectorAll('.csi-programme-v3-tab-panel');

    tabs.forEach(tab => {
      tab.addEventListener('click', function() {
        const targetTab = this.getAttribute('data-tab');

        // Remove active class from all tabs in this container
        tabs.forEach(t => t.classList.remove('active'));

        // Add active class to clicked tab
        this.classList.add('active');

        // Hide all panels in this container
        panels.forEach(panel => {
          panel.classList.remove('active');
        });

        // Show target panel
        const targetPanel = container.querySelector('#' + targetTab);
        if (targetPanel) {
          targetPanel.classList.add('active');
        }
      });
    });
  });
}

document.addEventListener('DOMContentLoaded', initProgrammeV3Tabs);
</script>

<script>
window.addEventListener('DOMContentLoaded',function(){
  var iframe=document.getElementById('clientFrame');
  function loadPage(id){
    var tpl=document.getElementById(id);
    if(!tpl)return;
    if(iframe&&iframe.contentDocument){
      iframe.contentDocument.open();
      iframe.contentDocument.write(tpl.innerHTML);
      iframe.contentDocument.close();
    }else{
      var c=document.createElement('div');
      c.innerHTML=tpl.innerHTML;
      document.body.innerHTML='';
      while(c.firstChild)document.body.appendChild(c.firstChild);
    }
    window.scrollTo(0,0);
  }
  function getHash(){
    var h=location.hash.replace('#','');
    return h?h.split('|')[0]:'home';
  }
  window.addEventListener('hashchange',function(){loadPage(getHash());});
  loadPage(getHash());
});
</script>

0%; height:100%; object-fit:cover; border-radius:inherit;"></div>           <div>             <span class="kicker">Speaker Profile</span>             <h1>Shawn Theunissen</h1>             <p class="role">CSR Executive and Founder - Property Point • Property Point</p>             <p class="copy profile-note">Shawn Theunissen is a CSR Executive at one of largest listed real estate investment trust in South Africa. He is the Founder and CEO of Property Point, a business incubation and enterprise development organisation enabling Small and Growing Businesses (SGBs) to participate in South Africa’s property and green economy value chains. Shawn has championed human-centred, ecosystem-based programmes, including Property Point’s Greenpreneur Programme, combining technical training, business support and access to industry networks, with a focus on women and youth participation..</p>             <div class="actions"><a href="full-programme.html">View Programme —</a><a href="insights.html">View Insight —</a></div>           </div>         </div>       </div>     </section>     <section class="direction">       <div class="direction-card">         <span class="kicker">Coming Up</span>         <h2>Profile activity</h2>         <div class="direction-grid simple-profile-grid">           <article><b>Session</b><p>How the JET creates unprecedented CSI alignment opportunities across spatial exclusion, skills mismatch, and enterprise development. Lessons from the JET Funding Platform for coordinated, systemic CSI investment.</p></article>           <article><b>Feature</b><p><a href="article-pages/shawn-theunissen-designing-markets-inclusion.html">Designing Markets with Inclusion Built In</a> — Shawn Theunissen argues that enterprise development works when markets are designed for inclusion.</p></article>           <article><b>Connect</b><p>CSR Executive and Founder - Property Point • Property Point</p></article>         </div>       </div>     </section>   </main> <!-- JS for profil urship, mentorship, governance support, sport, and leadership development. Alongside this, her professional work in fintech and digital financial services across African markets has given her an insider’s understanding of how large organisations attempt to create impact at scale.</p> <p>It is this dual vantage point that makes her voice particularly relevant for the CSI and social investment community.</p> <p>Khosa’s work did not begin in boardrooms or strategy sessions. It began by observing both the beauty and the pain within communities. Growing up, she saw talented young people with immense potential but limited access to opportunities, exposure, guidance, and networks. At the same time, she witnessed ordinary individuals doing extraordinary things with very little support.</p> <p>This experience shaped a core belief that communities already carry solutions within them. What is often missing is not ideas or willingness, but support, trust, coordination, and consistency.</p> <p>She frequently speaks of the “gogos” who feed children from their own SASSA grants, volunteers who mentor youth after hours, and community organisations that continue operating despite chronic resource shortages. These are the people who keep her motivated and who inform her approach to development work.</p> <div class="pull-quote"><p>It is this dual vantage point that makes her voice particularly relevant for the CSI and social investment community.</p></div> <p>One of the central themes Khosa is expected to explore at the Indaba is inequality and economic exclusion in South Africa. She argues that one of the biggest drivers of inequality is that historically marginalised communities are still not meaningfully participating in the economy or the means of production.</p> <p>For many young people, especially in rural areas, access to relevant skills, networks, and opportunities remains limited. Even when individuals are talented and willing, systemic barriers often prevent them from entering meaningful economic spaces.</p> <p>At the same time, Khosa believes corporates are not yet opening doors wide enough. Rural communities, in particular, can feel forgotten. There is often an assumption that “someone else” is addressing the issues, when in reality, no one is doing so at the scale required.</p> <p>She is candid in her assessment that, as a society, the effort being directed towards solving inequality is still too small relative to the magnitude of the problem. When CSI or social investment budgets are compared to executive bonuses, she suggests it becomes clear that inequality is not yet being treated with the urgency it deserves.</p> <p>Through RGO’s Governance Masterclasses, Khosa has seen first-hand how grassroots organisations struggle not because they lack impact or passion, but because of governance, compliance, and administrative challenges. She recalls the case of a community organisation that eventually closed due to practical banking and compliance issues linked to signatories and administration — not because their work lacked value.</p> <p>These experiences have shaped her view that many CSI professionals do not spend enough time understanding the daily realities of grassroots organisations. Engagement can become overly formal, focused on presentations, reporting, and compliance rather than genuine understanding and partnership.</p> <p>Khosa believes meaningful impact happens when corporates ask deeper questions, build real relationships, and move beyond transactional funding models.</p> <p>She is also expected to challenge the tendency within CSI to repeat the same interventions year after year. As businesses grow and communities evolve, she sees an opportunity for corporates to expand their reach, think more creatively, and respond to emerging needs rather than relying on familiar programmes.</p> <p>A key shift she advocates for is more practical and proportionate processes. A small request for support, she argues, should not be subjected to the same complex procedures as a multi-million-rand proposal. Excessive bureaucracy often prevents smaller grassroots organisations from accessing support, even when the need is urgent and the potential impact is clear.</p> <p>Khosa calls for more trust, faster collaboration, and systems that move with the urgency communities face daily.</p> <p>Despite the challenges she highlights, her message is ultimately one of hope. She finds optimism in grassroots resilience, in young people who still believe in building a better future, and in community leaders who continue to serve despite burnout and limited support.</p> <p>Importantly, she also sees hope in platforms like the CSI Indaba itself — spaces where honest, intentional conversations about impact, inequality, and collaboration are beginning to take place more openly.</p> <p>Her address is likely to leave delegates not only with insight, but with a renewed sense of responsibility to rethink how CSI can work more practically, more humanely, and more effectively alongside the people closest to South Africa’s most pressing challenges.</p></div></article><div class="back-row"><a class="button secondary" href="insights.html">Back to Insights</a><a class="button" href="featured-speakers.html">View Speakers</a></div></section></main><aside class="floating-audio" id="floatingAudio" aria-label="Floating article audio player"><div class="floating-audio-inner"><button class="floating-play" id="floatingPlay" type="button" aria-label="Play article audio">▶</button><div><strong class="floating-title">Bridging Grassroots Realities and Corporate Impact</strong><span class="floating-status" id="floatingStatus">Audio narration</span></div><div class="floating-progress" aria-hidden="true"><span id="floatingProgress"></span></div></div></aside>     <!-- JS for article-kgomotso: article_audio_player --> <script src="assets/js/038_article_kgomotso_article_audio_player.js"></script> <!-- JS for article-kgomotso: navigation_router --> -content/uploads/2026/06/lindai.wav" type="audio/wav"></audio><p class="audio-note">Audio narration available</p></div></div><div class="article-body"><p>When Lidia Pretorius addresses delegates at the CSI Indaba in July 2026, she will bring more than four decades of experience anchored in social justice and disability inclusion across Africa. Her work has consistently examined a fundamental question: how systems determine who gets to participate, who belongs, and who holds influence.</p> <p>For Pretorius, disability inclusion is not a niche concern or specialist field. It is one of the clearest lenses through which to understand how power operates in society. As one of the largest minority identities globally, persons with disabilities are still routinely placed furthest from decision-making, opportunity, and institutional design. This reality, she argues, reveals far more about how systems function than many organisations are willing to confront.</p> <p>Her career has spanned work with persons with disabilities, their representative organisations, governments, corporates, and development partners across the continent. Over time, this experience has led her to a sobering realisation: exclusion is rarely accidental. It is built gradually into systems until it begins to look like the natural order of things, often invisible even to those with the best intentions.</p> <p>Working closely with persons with disabilities reshaped how Pretorius understands inequality, leadership, and justice. Disability, she says, is not outside of society. It is a mirror, showing exactly who systems were designed for and who they were quietly prepared to leave out.</p> <p>This insight sits at the heart of what she is expected to challenge at the Indaba: that much of CSI and development work still treats the symptoms of exclusion rather than the systems that produce it.</p> <p>Poverty and unemployment are urgent crises, she acknowledges. Yet beneath these visible realities are institutional gatekeepers that determine who can move through schools, workplaces, transport systems, digital platforms, and development programmes. Inequality persists because many people remain structurally cut off from the networks where opportunity, influence, and belonging are created.</p> <div class="pull-quote"><p>When Lidia Pretorius addresses delegates at the CSI Indaba in July 2026, she will bring more than four decades of experience anchored in social justice and disability inclusion across Africa.</p></div> <p>Pretorius is critical of the tendency to build parallel structures — separate programmes and support mechanisms that help people survive exclusion rather than end it. In the disability sector, this is especially evident. Specialised spaces and services are funded and maintained, while mainstream systems remain largely unchanged.</p> <p>She draws an uncomfortable parallel: managing exclusion through separation rather than dismantling it through redesign echoes older segregationist logic. Disability becomes cordoned off to its own stream, instead of prompting the harder question of whether the mainstream is fit for purpose at all.</p> <p>Central to her thinking is the concept of participation. Who is designed into a system from the outset, and who is not? Inclusion, she argues, only becomes a crisis once exclusion has already been built in. Enormous resources are then spent trying to retrofit people into environments that were never designed with them in mind.</p> <p>Universal design thinking offers a different approach. It asks whether inclusion is considered at the point of conception, rather than patched on afterwards. Disability is often where the failures of institutional design first become visible, exposing assumptions about who belongs and who does not.</p> <p>Within CSI, Pretorius sees both progress and tension. Where organisations are moving beyond compliance towards genuine partnership and long-term relationships, meaningful impact is occurring. In many cases, CSI funding has been essential in keeping disability organisations and services alive where mainstream systems have failed to provide adequate support.</p> <p>However, she cautions that if disability funding remains confined to a silo, CSI risks sustaining parallel structures indefinitely without shifting the conditions that made them necessary. The opportunity, she believes, lies in connecting disability-focused support more deliberately to the redesign of mainstream systems so they function for everyone.</p> <p>A persistent gap in CSI funding is that disability is still treated as a separate category rather than as a design requirement across all investments — whether in education, youth development, entrepreneurship, health, sport, or community programmes. Rarely, she notes, is the question asked: can persons with disabilities actually access what is being funded here?</p> <p>Pretorius is equally concerned by the tendency to outsource inclusion. Institutions often bring in consultants or partner with specialist organisations, then consider the job done while their own structures, culture, and operations remain untouched. When the project ends, systems revert because no internal capability was built.</p> <p>She sees a powerful role for CSI here: not only funding programmes, but investing in helping organisations develop their own capacity for inclusion through sustained partnership, shared learning, and design support over time.</p> <p>Her perspective is also shaped by African philosophies of community, which she describes as more relational and interconnected than many imported institutional models. Systems, she argues, should adapt to human diversity, not expect people to fit rigid frameworks. This requires valuing conversation, trust, negotiation, and relationship-building alongside measurable outputs.</p> <p>Inclusion is not only about access. It is about who shapes agendas, defines success, and designs what comes next. Without shifts in power, many inclusion efforts amount to inviting people into rooms designed without them and expecting gratitude.</p> <p>Despite the scale of the challenge, Pretorius is encouraged by signs of change within progressive CSI spaces. There is growing recognition that money alone does not create inclusion. The real lever lies in connecting funding to participation, relationships, and a willingness to interrogate how systems themselves are designed.</p> <p>As these conversations gain traction, she sees an important shift underway — from asking how people can be included in existing systems, to asking what those systems need to become. For Pretorius, that is where sustainable, long-term change truly begins.</p></div></article><div class="back-row"><a class="button secondary" href="insights.html">Back to Insights</a><a class="button" href="featured-speakers.html">View Speakers</a></div></section></main><aside class="floating-audio visible" id="floatingAudio" aria-label="Floating article audio player"><div class="floating-audio-inner"><button class="floating-play" id="floatingPlay" type="button" aria-label="Play article audio">▶</button><div><strong class="floating-title">Rethinking Inclusion from the Ground Up</strong><span class="floating-status" id="floatingStatus">Audio narration</span></div><div class="floating-progress" aria-hidden="true"><span id="floatingProgress"></span></div></div></aside>     <!-- JS for article-lidia: article_audio_player --> <script src="assets/js/040_article_lidia_article_audio_player.js"></script> <!-- JS for article-lidia: navigation_router --> <script src="assets/js/041_article_lidia_navigation_router.js?v=navfix1"></script> <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h) "><span>Vince Mbanze</span></div></div></section><section class="article-shell"><article class="article-card"><div class="audio-panel"><div class="audio-copy"><span>Listen to the article</span><h2>Audio narration</h2><p>A focused listening version of the article for delegates who prefer the audio experience.</p></div><div class="audio-control-card"><audio id="articleAudio" controls preload="none"><source src="https://csiindaba.africa/wp-content/uploads/2026/06/Vince-Mbanze.wav" type="audio/wav"></audio><p class="audio-note">Audio narration available</p></div></div><div class="article-body"><p>When Vince Mbanze takes the podium at the CSI Indaba in July 2026, delegates can expect a perspective shaped less by traditional development language and more by systems science, data integrity, and economic modelling. His work, through Nexusnode, sits at the intersection of data infrastructure, institutional trust, and the practical mechanics of how capital flows through real economies.</p> <p>Originally trained as a chemist, Mbanze developed an instinct for understanding underlying structures and mechanisms — how complex systems behave, and what happens when one part fails to connect with another. Over time, he began applying this same thinking to economics, technology, and social systems. The result is a distinctive lens through which he examines inequality, not only as a social issue, but as a systems failure.</p> <p>For Mbanze, historical exclusion remains the foundation of inequality in South Africa. However, one of the most significant modern drivers, he argues, is the disconnect between available capital and productive opportunity. Across the country, there is talent, innovation, and community potential. Yet the systems meant to connect investment to meaningful economic participation are often fragmented, inefficient, or difficult to trust.</p> <p>This disconnect, he believes, is not due to a lack of goodwill or funding. Rather, many interventions focus on visible outcomes without addressing the underlying “economic plumbing” that produces them. If financial systems remain biased towards existing centres of wealth and influence, progress in underserved communities will always be slow, no matter how well-intentioned the programmes.</p> <p>Two major constraints stand out in his analysis: information asymmetry and weak transmission between capital and productive activity. Investors and funders frequently struggle to assess risk in underserved areas because the evidence infrastructure is weak or scattered. Without reliable, verifiable data, decisions default to safer, familiar environments, leaving marginalised communities further excluded.</p> <p>At the same time, spatial inequality and uneven infrastructure make it difficult for opportunity and investment to circulate efficiently. Even strong initiatives can become trapped in bottlenecks related to access, institutional trust, and poor coordination between stakeholders.</p> <div class="pull-quote"><p>When Vince Mbanze takes the podium at the CSI Indaba in July 2026, delegates can expect a perspective shaped less by traditional development language and more by systems science, data integrity, and economic modelling.</p></div> <p>Within the CSI landscape, Mbanze sees encouraging signs where programmes directly build human capacity at a local level. Initiatives focused on STEM education, digital literacy, and renewable energy in underserved communities are particularly impactful because they are targeted, measurable, and trusted by the people they serve. These programmes create conditions where private capital can begin to reach areas that broader institutional systems often fail to support.</p> <p>However, he is also frank about where CSI falls short. Too often, funding prioritises visibility and reputation over long-term structural change. Resources remain concentrated in already-developed areas, while communities most in need of investment are overlooked.</p> <p>Without integrated data infrastructure, Mbanze argues, CSI risks becoming a fragmented palliative — addressing symptoms of systemic failure rather than building the verifiable evidence layers required to de-risk and scale meaningful transformation. What is needed is a shift away from isolated initiatives towards a coordinated system grounded in shared data, accountability, and transparency.</p> <p>He advocates for a different form of collaboration, moving from transactional charity towards what he describes as systemic de-risking. By creating verifiable “trust layers” between government policy, corporate capital, and civic action, efforts can be synchronised around auditable outcomes rather than good intentions alone.</p> <p>Central to this vision is the idea of replacing blind institutional trust with cryptographic or evidence-based systems that reduce information asymmetry. When outcomes and decisions can be validated through transparent data, capital and resources can flow more directly to what he calls the “productive edge” — the places where potential exists but is currently constrained by bureaucracy and mistrust.</p> <p>This approach, Mbanze believes, would allow organisations to bypass many of the extraction loops and administrative bottlenecks that currently sustain inequality. Instead of relying on fragmented reporting and compliance processes, institutions could operate within a shared framework of verifiable evidence, making it easier to allocate resources where they are genuinely needed.</p> <p>Despite the complexity of the challenges he outlines, Mbanze is optimistic. He sees hope in the growing capacity to design systems that are transparent, accountable, and verifiable by design. There is a shift underway from relying purely on institutional reputation to relying on evidence that can be independently validated.</p> <p>For him, this evolution creates real potential for fairer, more efficient institutions and a stronger foundation for long-term social and economic progress. As CSI professionals, corporates, and development practitioners gather at the Indaba, Mbanze’s message is likely to challenge them to look beyond programmes and projects, and instead interrogate the systems that determine whether capital, trust, and opportunity can truly reach those who need them most.</p></div></article><div class="back-row"><a class="button secondary" href="insights.html">Back to Insights</a><a class="button" href="featured-speakers.html">View Speakers</a></div></section></main><aside class="floating-audio visible" id="floatingAudio" aria-label="Floating article audio player"><div class="floating-audio-inner"><button class="floating-play" id="floatingPlay" type="button" aria-label="Play article audio">▶</button><div><strong class="floating-title">Building Trust Through Data and Systems Thinking</strong><span class="floating-status" id="floatingStatus">Audio narration</span></div><div class="floating-progress" aria-hidden="true"><span id="floatingProgress"></span></div></div></aside>     <!-- JS for article-vince: article_audio_player --> <script src="assets/js/042_article_vince_article_audio_player.js"></script> <!-- JS for article-vince: navigation_router --> <script src="assets/js/043_article_vince_navigation_router.js?v=navfix1"></script> <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];     return 'home';   }   window.addEventListener('hashchange',function(){showPage(getFromHash());});   showPage(getFromHash()); })(); </script>    <script> window.addEventListener('DOMContentLoaded',function(){   var iframe=document.getElementById('clientFrame');   function loadPage(id){     var tpl=document.getElementById(id);     if(!tpl)return;     if(if hat create real access to opportunity — particularly for young people, women, and small businesses excluded from mainstream economic participation.</p> <p>Her work sits at the intersection of socio-economic development, digital innovation, and inclusive growth. Over the years, she has helped organisations move beyond tick-box transformation towards measurable, meaningful impact through enterprise and social economic development strategies, youth capability development, and cross-sector partnerships.</p> <p>More recently, through initiatives such as Future Shift  and the Teens in AI Techathon Series, van Wyk has focused strongly on future skills and digital inclusion. These programmes create practical spaces where young people — especially girls — engage with artificial intelligence, innovation, and problem-solving in ways that build confidence, agency, and long-term opportunity.</p> <p>At the heart of her work is a simple but powerful belief: talent exists everywhere, but opportunity does not.</p> <p>Across South Africa, she has encountered capable young people and entrepreneurs who lack access to networks, exposure, resources, and platforms that others take for granted. Over time, she came to believe that transformation cannot happen at policy level alone. It requires intentional ecosystem building that creates pathways for meaningful participation in the economy and in shaping the future.</p> <p>This belief was reinforced through her work with youth and women. Seeing a young person enter a room unsure of their potential and leave believing they can solve real-world problems, she says, is a powerful reminder of how transformative access and exposure can be.</p> <div class="pull-quote"><p>At the heart of her work is a simple but powerful belief: talent exists everywhere, but opportunity does not.</p></div> <p>Van Wyk argues that one of the biggest drivers of inequality is unequal access — to quality education, technology, economic participation, and future-facing opportunities. As technology, automation, and artificial intelligence reshape economies, many young people remain excluded from the systems preparing others for that future. The result is a widening digital and economic divide.</p> <p>She is also concerned by the structural disconnection between sectors. Government, corporates, education systems, and communities often operate in silos, while the challenges they are trying to address are deeply interconnected. Without deliberate collaboration, interventions remain fragmented and short-term.</p> <p>A key theme in her address is likely to be the need to move from measuring activity to measuring sustained impact. Too many programmes, she suggests, are designed around reporting cycles rather than long-term systems change. Transformation becomes a compliance requirement rather than a redesign of access, power, and capability.</p> <p>She identifies several structural constraints: the disconnect between education and future workforce realities, limited access to technology and mentorship, and ecosystem fragmentation. For women and girls, additional barriers related to safety, representation, and participation in STEM spaces further restrict opportunity.</p> <p>Within the CSI landscape, van Wyk sees some of the strongest impact where organisations invest in capability building and ecosystem collaboration rather than once-off interventions. Programmes that expose young people to innovation, entrepreneurship, and digital skills are particularly important because they prepare communities for the changing nature of work.</p> <p>She is encouraged by CSI initiatives that create agency — where beneficiaries become participants, innovators, and future leaders rather than passive recipients of support. However, she notes that many impactful programmes struggle to scale due to limited collaboration and sustained funding.</p> <p>Another gap is insufficient investment in future-facing capability development in underserved communities. As digital transformation accelerates, entire communities risk being left further behind if access to technology and innovation spaces is not prioritised.</p> <p>Van Wyk calls for more integrated partnership models built around shared outcomes. Government brings scale, corporates bring resources and innovation capacity, and civil society brings proximity to communities. The challenge is aligning these strengths into cohesive, long-term collaboration rather than isolated mandates.</p> <p>Importantly, she stresses that communities and young people themselves must be involved in designing solutions. Sustainable impact requires co-creation, not top-down intervention.</p> <p>What gives her hope is young people. Through Future Shift, she has witnessed teenagers from underserved communities confidently pitch AI-powered solutions to industry leaders and design digital tools to address issues such as online safety and mental health. When trusted with real problems and real technology, she says, young people produce real solutions.</p> <p>She is also hopeful because there is growing recognition across sectors that inclusion, future skills, and ecosystem collaboration are essential to sustainable impact.</p> <p>For van Wyk, transformation becomes most powerful when people begin to believe they belong in spaces they once thought were beyond them. Her message at the CSI Indaba will be clear: the future will be shaped not by those who currently hold the most resources, but by those motivated to change the conditions they grew up in — if they are given the opportunity to do so.</p></div></article><div class="back-row"><a class="button secondary" href="insights.html">Back to Insights</a><a class="button" href="featured-speakers.html">View Speakers</a></div></section></main><aside class="floating-audio visible" id="floatingAudio" aria-label="Floating article audio player"><div class="floating-audio-inner"><button class="floating-play" id="floatingPlay" type="button" aria-label="Play ar el"><div class="audio-copy"><span>Listen to the article</span><h2>Audio narration</h2><p>A focused listening version of the article for delegates who prefer the audio experience.</p></div><div class="audio-control-card"><audio id="articleAudio" controls preload="none"><source src="https://csiindaba.africa/wp-content/uploads/2026/06/Aluta-Nomzamo.wav" type="audio/wav"></audio><p class="audio-note">Audio narration available</p></div></div><div class="article-body"><p>When Aluta Nomzamo Kutsu takes the stage at the CSI Indaba in July 2026, she is expected to bring a grounded, systems-oriented perspective on social impact, sustainability, and inclusive development in South Africa. Her work sits at the intersection of socio-economic development, ESG, and data-informed decision-making — with a focus on translating complex development challenges into practical, measurable solutions.</p> <p>With a background in Political Science and Development Studies, Kutsu approaches inequality not as an abstract concept, but as a lived structural reality that shapes access to opportunity from birth. Her perspective has been shaped by a consistent question: how can long-term systems change replace short-term relief?</p> <p>For Kutsu, the answer lies in addressing the structural drivers of inequality rather than its symptoms.</p> <p>She was motivated to enter the development space by observing how deeply inequality determines life outcomes in South Africa. Access to quality education, employment, healthcare, and even safety is often dictated by geography and historical disadvantage. These conditions continue to shape where people live, the schools they attend, and the networks available to them.</p> <p>One of the most persistent drivers of inequality, she argues, is unequal access to quality education and economic opportunity. South Africa’s labour market remains highly unequal, with many young people excluded from meaningful participation in the economy. Historical patterns of exclusion continue to reinforce spatial inequality, limited mobility, and restricted access to opportunity.</p> <p>Kutsu emphasises that inequality persists not because of a lack of effort, but because many interventions focus on symptoms rather than systemic causes. While there are numerous well-intentioned initiatives, they are often fragmented, short-term, or poorly coordinated. Complex challenges such as unemployment, weak education outcomes, infrastructure deficits, and digital exclusion are deeply interconnected — and therefore require integrated, long-term responses.</p> <div class="pull-quote"><p>For Kutsu, the answer lies in addressing the structural drivers of inequality rather than its symptoms.</p></div> <p>She identifies several structural constraints that continue to reinforce inequality: unemployment, unequal education outcomes, spatial inequality, digital exclusion, and limited economic participation for young people and small businesses. A further challenge is the persistent mismatch between education systems and labour market needs, which leaves many young people underprepared for available opportunities.</p> <p>Within the corporate social investment landscape, Kutsu acknowledges the meaningful contributions made in areas such as education, youth development, skills training, entrepreneurship support, and community development. She also notes a growing shift among corporates towards more intentional impact measurement and sustainability, moving beyond compliance-driven approaches.</p> <p>Programmes that combine funding with mentorship, capacity building, and long-term partnerships, she observes, tend to generate more sustainable and meaningful outcomes.</p> <p>However, she is equally clear about where CSI still falls short. Many initiatives remain too short-term, disconnected from community realities, or designed primarily to meet reporting requirements. This can result in a focus on isolated projects rather than systemic change.</p> <p>In some cases, she argues, organisations continue to operate in silos, limiting their ability to create scalable and sustainable impact. Without stronger alignment between corporates, government, civil society, and communities, opportunities for meaningful transformation are lost.</p> <p>Kutsu calls for a shift towards deeper collaboration built on shared long-term goals, accountability, and integration. This includes improved data sharing, stronger community participation, and better continuity between policy design and implementation.</p> <p>For her, one of the most important priorities is improving access to quality education and strengthening pathways into employment for young people. Education, she argues, remains one of the most powerful tools for reducing inequality — but only when it is directly linked to practical skills, digital access, mentorship, and real economic opportunities.</p> <p>She believes that sustainable development depends on aligning education systems with the realities of the labour market, particularly in a rapidly changing world shaped by technology and shifting economic demands.</p> <p>Kutsu is encouraged by growing momentum in the development and sustainability space. She sees increasing numbers of organisations, professionals, and communities embracing innovation, collaboration, and social impact as interconnected priorities rather than separate agendas.</p> <p>She is also optimistic about the rise of data-driven decision-making, technology, and purpose-led leadership, which she believes can significantly improve how development interventions are designed, implemented, and evaluated.</p> <p>At the CSI Indaba, her message is likely to centre on a clear idea: that meaningful development requires moving beyond fragmented interventions towards coordinated systems change.</p> <p>For Kutsu, the path forward lies in treating inequality not as a set of isolated problems, but as a connected system that demands long-term collaboration, evidence-based decision-making, and sustained investment in human potential.</p></div></article><div class="back-row"><a class="button secondary" href="insights.html">Back to Insights</a><a class="button" href="featured-speakers.html">View Speakers</a></div></section></main><aside class="floating-audio visible" id="floatingAudio" aria-label="Floating article audio player"><div class="floating-audio-inner"><button class="floating-play" id="floatingPlay" type="button" aria-label="Play article audio">▶</button><div><strong class="floating-title">Advancing Data-Driven Inclusion and Sustainable Development</strong><span class="floating-status" id="floatingStatus">Audio narration</span></div><div class="floating-progress" aria-hidden="true"><span id="floatingProgress"></span></div></div></aside>     <!-- JS for article-aluta: article_audio_player --> <script src="assets/js/048_article_aluta_article_audio_player.js"></script> <!-- JS for article-aluta: navigation_router --> <script src="assets/js/049_article_aluta_navigation_router.js?v=navfix1"></script> <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];     return 'home';   }   window.addEventListener('hashchange',function(){showPage(getFromHash());});   showPage(getFromHash()); })(); </script>    <script> window.addEventListener('DOMContentLoaded',function(){   var iframe=document.getElementById('clientFrame');   function loadPage(id){     var tpl=document.getElementById(id);     if(!tpl)return;     if(iframe&&iframe.contentDocument){       iframe.contentDocument.open();       iframe.contentDocument.write(tpl.innerHTML);       iframe.contentDocument.close();     }else{       var c=document.createElement('div');       c.innerHTML=tpl.innerHTML; P+4FpKEWl+8VBzZBpwuhYhUTkKhkQgmon+1GSNlhTMHY3i7m9aMynZV1AcMymKcvU52vYvJiD4K/r0A+31e1l7bnReGvs8ZjD5GCFb8R2Gc0b3Lz5OM3BuMCHwuMAAAAAAAAAAAAAAAAA" alt="Carmen Mollmann"><span>Carmen Mollmann</span></div></div></section><section class="article-shell"><article class="article-card"><div class="audio-panel"><div class="audio-copy"><span>Listen to the article</span><h2>Audio narration</h2><p>A focused listening version of the article for delegates who prefer the audio experience.</p></div><div class="audio-control-card"><audio id="articleAudio" controls preload="none"><source src="https://csiindaba.africa/wp-content/uploads/2026/06/Carmen.wav" type="audio/wav"></audio><p class="audio-note">Audio narration available</p></div></div><div class="article-body"><p>In July 2026, Carmen Mollmann will take the stage at the CSI Indaba, bringing with her more than two decades of experience working at the intersection of finance, climate action and social equity across Sub-Saharan Africa. As a leader at the JET Funding Platform, Mollmann is helping to direct grant capital towards one of the most consequential policy and funding agendas in the Global South: South Africa’s Just Energy Transition (JET).</p> <p>For Mollmann, the climate crisis and the inequality crisis are not parallel challenges. They are deeply intertwined. South Africa sits at a particularly sharp edge of this convergence, as one of the world’s most carbon-intensive economies, and at the same time, one of the most unequal societies, with energy-vulnerable communities bearing the brunt of both.</p> <p>Her work is motivated by a simple but powerful conviction: the transition away from fossil fuels must be not only green, but genuinely just.</p> <p>Over 20 years, Mollmann’s career has spanned climate change, energy transition, agriculture, green jobs, and inclusive enterprise development. She has worked with NGOs, governments, trade unions and international agencies, building a nuanced understanding of how development finance, public policy and community realities intersect. This background has shaped how she views the Just Energy Transition: not as a technical energy problem, but as a deeply social and economic one.</p> <p>She draws on the concept of “wicked problems”, first articulated by urban planners Horst Rittel and Melvin Webber in 1973. Unlike “tame” problems, which can be solved with known methods, wicked problems resist resolution because the problem itself shifts as solutions are attempted, and because every intervention produces unintended consequences. For Mollmann, inequality in South Africa is the archetypal wicked problem.</p> <p>While the structural legacy of apartheid is foundational, the persistence of inequality over 30 years of democracy points to ongoing drivers such as education quality, state capacity, market concentration and spatial economics. The challenge, she argues, is not a lack of effort or resources, but the tendency to approach inequality as if it were tame, solvable through a single policy, programme or investment.</p> <div class="pull-quote"><p>Her work is motivated by a simple but powerful conviction: the transition away from fossil fuels must be not only green, but genuinely just.</p></div> <p>Seen through a JET lens, this becomes even clearer.</p> <p>The pace of the energy transition often outstrips the pace of community readiness. Workers, municipalities and affected communities need support that precedes, rather than follows, coal plant closures. Funding is also deeply fragmented. Climate finance, development finance, philanthropy and government grants frequently operate in silos, leading to duplication in some areas and dangerous gaps in others. At the same time, local governance capacity remains a critical constraint. Many municipalities and community structures lack the institutional ability to absorb and deploy transition funding effectively, meaning well-intentioned capital either stalls or bypasses those who need it most.</p> <p>This is where Mollmann sees a crucial role for corporate social investment (CSI).</p> <p>She argues that the most meaningful CSI impact occurs where three elements align: long-term, multi-year commitments; genuine community co-design rather than top-down delivery; and a clear theory of change that addresses a structural barrier rather than an immediate need. Yet, much CSI in South Africa remains driven by regulatory compliance and short funding cycles, supporting pilots that never scale and projects that end when the grant period does.</p> <p>There is also a structural inefficiency in how CSI funding flows. By the time a typical CSI rand moves from a corporate department to an implementing NPO, then to a community sub-grantee, and finally to a beneficiary, a significant portion has been absorbed by administration and overhead. This layered system, while well-intentioned, often concentrates resources among large, well-resourced NPOs skilled at winning grants, while grassroots organisations with deep local trust remain underfunded.</p> <p>The common objection is that community organisations are “not ready”. Mollmann challenges this directly. If two decades of intermediary-led funding has not built that readiness, she argues, then the model itself must be questioned.</p> <p>Despite the scale and complexity of the challenge, Mollmann remains hopeful. She sees a growing cohort of young engineers, community energy entrepreneurs, climate-smart agripreneurs and climate finance specialists who are already building the just transition from the inside out. They are not waiting for permission, nor looking elsewhere for solutions.</p> <p>The JET Funding Platform exists, she says, because there is already a critical mass of South Africans who understand that this moment is both urgent and generative. That rare combination presents a profound opportunity.</p> <p>At the CSI Indaba, Carmen Mollmann is expected to challenge delegates to rethink not only how CSI money is spent, but how it moves, who it empowers, and how it can be harnessed to address South Africa’s most complex, “wicked” challenges. Her message is likely to be clear: a just energy transition will not be achieved through megawatts alone, but through people, partnerships, and patient, purposeful capital.</p></div></article><div class="back-row"><a class="button secondary" href="insights.html">Back to Insights</a><a class="button" href="featured-speakers.html">View Speakers</a></div></section></main><aside class="floating-audio visible" id="floatingAudio" aria-label="Floating article audio player"><div class="floating-audio-inner"><button class="floating-play" id="floatingPlay" type="button" aria-label="Play article audio">▶</button><div><strong class="floating-title">Financing a Just Energy Transition That Centres People</strong><span class="floating-status" id="floatingStatus">Audio narration</span></div><div class="floating-progress" aria-hidden="true"><span id="floatingProgress"></span></div></div></aside>     <!-- JS for article-carmen: article_audio_player --> <script src="assets/js/050_article_carmen_article_audio_player.js"></script> <!-- JS for article-carmen: navigation_router --> <script src="assets/js/051_article_carmen_navigation_router.js?v=navfix1"></script> <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];     return 'home';   }   window.addEventListener('hashchange',function(){showPage(getFromHash());});   showPage(getFromHash()); })(); </script>    <script> window.addEventListener('DOMContentLoaded',function(){   var iframe=document.getElementById('clientFrame');   function loadPage(id){     var tpl=document.getElementById(id);     if(!tpl)return;     if(iframe&&iframe.co </a></li></ul></nav></header><main><section class="article-hero"><img class="article-hero-bg" src="https://csiindaba.africa/wp-content/uploads/2026/07/wwwwwww.png" alt="" aria-hidden="true"><div class="hero-copy"><span class="kicker">Executive Article</span><h1>Designing Markets with Inclusion Built In</h1><p class="dek">When Shawn Theunissen takes the podium at the CSI Indaba in July 2026, he will bring a perspective shaped by years of working across corporate social investment (CSI), transformation, enterprise development and ESG within South Africa’s property and built...</p><div class="hero-author"><img src="https://csiindaba.africa/wp-content/uploads/2026/06/ChatGPT-Image-Jun-19-2026-05_05_55-AM.png" alt="Shawn Theunissen"><span>Shawn Theunissen</span></div></div></section><section class="article-shell"><article class="article-card"><div class="audio-panel"><div class="audio-copy"><span>Listen to the article</span><h2>Audio narration</h2><p>A focused listening version of the article for delegates who prefer the audio experience.</p></div><div class="audio-control-card"><audio id="articleAudio" controls preload="none"><source src="https://csiindaba.africa/wp-content/uploads/2026/06/Shawn-Theunissen.wav" type="audio/wav"></audio><p class="audio-note">Audio narration available</p></div></div><div class="article-body"><p>When Shawn Theunissen takes the podium at the CSI Indaba in July 2026, he will bring a perspective shaped by years of working across corporate social investment (CSI), transformation, enterprise development and ESG within South Africa’s property and built environment sectors.</p> <p>As Head of CSR and Transformation at Growthpoint Properties, and Founder of Property Point, Theunissen’s work centres on a simple but often overlooked question: how do we ensure that more small businesses and more people can participate meaningfully in the economy, not only benefit from it at the margins?</p> <p>His career has been dedicated to building bridges: between CSI and procurement, between transformation strategy and practical market access, and between large corporates and small, growing enterprises. Through Property Point, he has worked directly with entrepreneurs striving to access formal value chains. At Growthpoint, he has seen from the inside how corporate decisions around procurement, partnerships, supplier development and community investment can either reinforce patterns of exclusion or help dismantle them.</p> <p>For Theunissen, inequality in South Africa is fundamentally about unequal access to economic participation.</p> <p>“We often speak about inequality in terms of poverty or unemployment,” he explains, “but underneath that is a deeper structural issue. Too many people and small businesses are excluded from the places where value is created — supply chains, procurement systems, productive sectors, networks, finance and decision-making spaces.”</p> <p>Nowhere is this clearer than in the property and built environment sector. Facilities management, maintenance, construction, energy efficiency, renewable energy, security, cleaning and landscaping all present real economic opportunities. Yet unless value chains are intentionally opened to emerging businesses, the benefits continue to flow to established players.</p> <div class="pull-quote"><p>For Theunissen, inequality in South Africa is fundamentally about unequal access to economic participation.</p></div> <p>The same risk applies to the green economy. Without deliberate design, new sectors can easily reproduce old inequalities.</p> <p>Theunissen believes one reason inequality persists is that many well-meaning interventions remain fragmented and disconnected from the real economy. Training, mentorship and funding programmes are valuable, but insufficient if entrepreneurs cannot access consistent, credible markets. This is one of the core lessons from Property Point: enterprise development works best when it is directly linked to procurement opportunities and when corporates are willing to adjust how they engage with small businesses.</p> <p>At Growthpoint, this insight has reinforced the view that CSI and transformation cannot sit as compliance functions on the periphery of the business. They must be connected to ESG, procurement, operations and overall business strategy.</p> <p>He identifies several binding constraints that keep small businesses locked out. The first is market access. Many enterprises do not fail because of a lack of skill or determination, but because they cannot secure paying customers at scale. The second is procurement design. Corporate systems are often built for large, established suppliers, with compliance requirements, payment terms and tender processes that unintentionally exclude emerging firms. The third is access to appropriate finance, particularly working capital aligned to small business cash flow realities. The fourth is capability and readiness — governance, financial management, quality control and the ability to meet corporate standards. The fifth is ecosystem fragmentation, where corporates, government and development organisations work on similar issues without coordination. The sixth is trust, on both sides of the corporate–small business divide.</p> <p>This is where Theunissen sees CSI evolving.</p> <p>The most meaningful CSI impact, he argues, occurs when it moves beyond short-term charity and invests in long-term capability, access and inclusion. At Growthpoint, CSI initiatives linked to education, skills development, enterprise development and community resilience are helping to create real pathways into the economy. Through Property Point, he has seen how supporting a small business to become a credible supplier, win contracts and grow sustainably can have far deeper impact than once-off interventions.</p> <p>He is encouraged by the growing alignment between CSI and ESG priorities, particularly in the property sector where sustainability, local economic development and supplier inclusion increasingly intersect. However, he cautions that CSI still falls short when success is measured by activities and outputs rather than outcomes and systems change.</p> <p>A company may report how many people were trained or how much money was spent, but the more important questions are whether jobs were created, whether businesses entered value chains, and whether inequality was meaningfully reduced.</p> <p>For Theunissen, the next evolution of CSI is integration. CSI must speak to transformation. Transformation must speak to procurement. Procurement must speak to enterprise development. And enterprise development must connect to real market demand.</p> <p>Drawing on his experience as former President of the Johannesburg Chamber of Commerce and Industry, Chairperson of the ANDE Global Advisory Committee and Chairperson of Social Enterprise Academy Africa, he emphasises that inclusive economic development requires strong ecosystems rather than isolated programmes. When corporates, government and civil society align around a shared objective, the impact is far greater.</p> <p>If he could change one thing, it would be to stop treating inclusion as an afterthought. Instead, markets — whether in the green economy, infrastructure, property services or energy — should be designed from the outset with small business participation in mind.</p> <p>What gives him hope is the quality and resilience of South Africa’s entrepreneurs, and the growing recognition among corporates that CSI is not only about giving back, but about opening up: supply chains, access, opportunity and the economy itself.</p> <p>At the CSI Indaba, Shawn Theunissen is expected to challenge delegates to rethink how economic opportunity is structured, and to consider how CSI, transformation and business strategy together can begin to shift inequality in more meaningful and lasting ways.</p></div></article><div class="back-row"><a class="button secondary" href="insights.html">Back to Insights</a> yQKLUfJd+KX6cDoq5j4irgFbAkR0zkR81hLJXb9wfdZxhM3rEZpR2aYYCc9lKyQ/d3wkidHWTi4L84AS/rhPfRK1mDr65FXxpT0gkgCRo3gCfidB7hK9ccMAFZU3soD50Hhs+vxCkc4CDYHqYuF9MZGYzQY5y0cz4yzeg0yIxvOfpUwD2ImISB3iv9Qgjp/qAazj8u5owvks0RnO0aOFKfF19sdjdvrfIp96qzIiVhZB48jzFUFhnpj6KQAlSLMwbi2vZXejp7+c5Etjj4iSeiVjmJIUbB4/0NS5s1GweYW+6kacn5oeEhpnLOI4/TR0bPANy3p2qDFq0+AXgFB3XMul01DuQjJULnELWwruTGKiRWNqfF0VXkEFNvyjkFEh7Q4bMsGIpdqXnzYkRBdioigS6hF0OBMJVJlf1Y+8tqkVueAAAAAAAAAAAAAAAAAAAAA=" alt="Kirsten Fagyas"><span>Kirsten Fagyas</span></div></div></section><section class="article-shell"><article class="article-card"><div class="audio-panel"><div class="audio-copy"><span>Listen to the article</span><h2>Audio narration</h2><p>A focused listening version of the article for delegates who prefer the audio experience.</p></div><div class="audio-control-card"><audio id="articleAudio" controls preload="none"><source src="https://csiindaba.africa/wp-content/uploads/2026/06/Kirsten-Fagyas.wav" type="audio/wav"></audio><p class="audio-note">Audio narration available</p></div></div><div class="article-body"><p>As South Africa continues to grapple with the entrenched realities of inequality and exclusion, practical thinkers who can bridge the gap between intention and implementation are increasingly vital. Among the speakers set to address this challenge at the CSI Indaba in July 2026 is Kirsten Fagyas, a systems designer whose work sits at the intersection of youth development, small business support and structural reform.</p> <p>Hosted by CSI Indaba, the gathering brings together leaders in corporate social investment, sustainability and development to rethink how resources can be deployed for lasting social and economic inclusion. Fagyas’ approach speaks directly to this ambition.</p> <p>At the heart of her work is a deceptively simple premise: there is actually enough. Enough talent. Enough funding. Enough people who want to work, contribute and build better futures. The real challenge, she argues, is not scarcity, but fragmentation. Resources exist, but they are often disconnected, trapped within systems built around short-term targets, reporting cycles and well-meaning but isolated interventions.</p> <p>Fagyas has spent more than two decades as a small business owner herself, giving her first-hand insight into the operational pressures faced by micro and small enterprises. She understands that these entrepreneurs are frequently overwhelmed, excluded from the professional service economy and unable to afford the expertise they need to grow. At the same time, she has seen how unemployed youth remain locked out of meaningful economic participation, not due to a lack of ability, but because they lack access to the right systems and opportunities.</p> <p>Her response has been to design a model that solves both challenges simultaneously.</p> <p>Through a 12-month paid work experience programme, cohorts of unemployed youth are trained across multiple business functions, including administration, finance, compliance, operations and marketing. Rather than being channelled into a single role, they gain a broad understanding of how businesses truly operate. Over time, participants gravitate towards the areas where they show the greatest aptitude and interest, while helping to mentor and train new cohorts.</p> <div class="pull-quote"><p>Her response has been to design a model that solves both challenges simultaneously.</p></div> <p>These youth teams then provide structured back-office support to micro and small businesses that would otherwise go without it.</p> <p>The result is a practical bridge between two groups that are typically treated as beneficiaries of support, rather than contributors to the economy. Youth gain meaningful work experience, multiple skills and income. Small businesses gain the operational capacity they need to stabilise and grow. Both become active participants in a shared economic ecosystem.</p> <p>For Fagyas, exclusion is the central driver of inequality in South Africa. Drawing on the thinking of political analyst Steven Friedman, she notes that millions remain “outsiders looking in”, shut out of the systems that create income, ownership and opportunity. This exclusion is not due to a lack of ambition, but because economic structures were largely designed for those already inside the formal economy.</p> <p>She is also deeply critical of how interventions are often funded and measured. Training without application, mentorship without implementation, and funding without sustained support rarely produce lasting change. The same youth move through multiple programmes. The same small businesses attend repeated workshops. Meanwhile, those most excluded remain outside the system because they require more consistent, practical support.</p> <p>Her call is for a shift from fragmented interventions to connected systems.</p> <p>This includes building shared infrastructure that provides real-time visibility into what is working, where duplication exists, and how resources can be coordinated more effectively. With AI-enabled systems, she believes it is now possible to create centralised, transparent and scalable models that were previously out of reach.</p> <p>Fagyas also draws inspiration from The Prosperity Paradox by Clayton M. Christensen, which argues that lasting prosperity comes from market creation. In her context, this means creating a structured market where unemployed youth deliver affordable, professional services to small businesses, supported by corporate funding, government frameworks and civil society expertise.</p> <p>Crucially, she believes those most affected by inequality must have a genuine seat at the table. Solutions are too often designed for communities rather than with them. When youth and entrepreneurs understand how value is created, what is expected of them, and how effort translates into opportunity, a shift occurs from entitlement to ownership.</p> <p>What gives Fagyas hope is that these ideas are no longer theoretical. In her own work, she has seen youth and small businesses embrace their roles as contributors when given the right systems. The outsiders, she says, are not waiting to be rescued. Given access, they are fully capable of building an economy that works for themselves and for others.</p> <p>It is this practical optimism, grounded in systems thinking and lived experience, that she brings to the CSI Indaba. In a sector often focused on activity and reporting, Kirsten Fagyas offers a compelling argument for redesigning the structures that determine who gets to participate in South Africa’s economy — and how.</p></div></article><div class="back-row"><a class="button secondary" href="insights.html">Back to Insights</a><a class="button" href="featured-speakers.html">View Speakers</a></div></section></main><aside class="floating-audio visible" id="floatingAudio" aria-label="Floating article audio player"><div class="floating-audio-inner"><button class="floating-play" id="floatingPlay" type="button" aria-label="Play article audio">▶</button><div><strong class="floating-title">Kirsten Fagyas on Building Systems that Work for Youth and Small Businesses</strong><span class="floating-status" id="floatingStatus">Audio narration</span></div><div class="floating-progress" aria-hidden="true"><span id="floatingProgress"></span></div></div></aside>     <!-- JS for article-kirsten: article_audio_player --> <script src="assets/js/054_article_kirsten_article_audio_player.js"></script> <!-- JS for article-kirsten: navigation_router --> <script src="assets/js/055_article_kirsten_navigation_router.js?v=navfix1"></script> <script> (function(){   var container=document.getElementById('page-container');   function showPage(id){     var tpl=document.getElementById(id);     if(tpl&&container){       container.innerHTML=tpl.innerHTML;       window.scrollTo(0,0);     }   }   function getFromHash(){     var h=window.location.hash.replace('#','');     if(h)return h.split('|')[0];
